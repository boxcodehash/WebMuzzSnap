<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>MuzzSnap Private</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" type="text/javascript"></script>
  <style>
    :root{
      --bg:#181d23;
      --panel:#11161c;
      --panel-2:#0c1015;
      --soft:#232a33;
      --line:rgba(255,255,255,.08);
      --red:#ff2a2a;
      --red-2:#b40000;
      --text:#f4f7fb;
      --muted:#95a0af;
      --green:#39ff14;
      --blue:#8ec5ff;
      --gold:#ffcc00;
      --safe-top:env(safe-area-inset-top, 0px);
      --safe-right:env(safe-area-inset-right, 0px);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
      --safe-left:env(safe-area-inset-left, 0px);
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#252b33 0%, #1b2027 100%);color:var(--text)}
    body{overflow:hidden;font-size:14px}
    .app{height:100%;display:grid;grid-template-columns:320px 1fr}
    .sidebar,.chat{min-height:0}
    .sidebar{background:rgba(10,13,17,.82);backdrop-filter:blur(10px);border-right:1px solid rgba(255,42,42,.14);padding:18px;display:flex;flex-direction:column;gap:16px}
    .brand{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid rgba(255,42,42,.18);border-radius:22px;background:linear-gradient(180deg,rgba(255,42,42,.06),rgba(255,42,42,.02))}
    .logo{width:46px;height:46px;border-radius:16px;background:linear-gradient(145deg,var(--red),var(--red-2));display:grid;place-items:center;box-shadow:0 0 20px rgba(255,42,42,.22);font-size:20px}
    .brand h1{margin:0;font-size:25px;letter-spacing:-1px;font-weight:900;font-style:italic}
    .brand h1 span{color:var(--red)}
    .card{background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:22px;padding:14px}
    .section-title{font-size:11px;letter-spacing:.28em;color:#8c95a3;text-transform:uppercase;font-weight:800;margin:0 0 12px}
    .user-badge{display:flex;align-items:center;gap:10px;padding:12px;border-radius:18px;background:rgba(255,42,42,.08);border:1px solid rgba(255,42,42,.16)}
    .avatar{width:42px;height:42px;border-radius:14px;background:linear-gradient(145deg,#2a313b,#12171d);display:grid;place-items:center;color:#fff;font-weight:900;flex:0 0 auto}
    .avatar.red{background:linear-gradient(145deg,var(--red),var(--red-2))}
    .avatar.gold{color:#111;background:linear-gradient(145deg,#ffe585,#ffcc00)}
    .avatar.blue{background:linear-gradient(145deg,#1e3b5b,#00d4ff)}
    .avatar.admin{background:linear-gradient(145deg,#5a2020,#ff6b6b)}
    .muted{color:var(--muted)}
    .small{font-size:11px}
    .tiny{font-size:10px}
    .contact-list{display:flex;flex-direction:column;gap:8px;overflow:auto;padding-right:4px}
    .contact{display:flex;align-items:center;gap:12px;padding:12px;border-radius:18px;border:1px solid transparent;background:rgba(255,255,255,.02);cursor:pointer;transition:.2s}
    .contact:hover{background:rgba(255,255,255,.04)}
    .contact.active{background:rgba(255,42,42,.08);border-color:rgba(255,42,42,.18)}
    .status{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);display:inline-block;margin-right:8px;flex:0 0 auto}
    .status.offline{background:#5f6b7a;box-shadow:none}
    .side-actions{display:grid;gap:10px}
    .btn{border:none;border-radius:18px;padding:14px 16px;font-weight:800;cursor:pointer;transition:.2s}
    .btn.red{background:linear-gradient(145deg,var(--red),var(--red-2));color:white;box-shadow:0 0 18px rgba(255,42,42,.18)}
    .btn.ghost{background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--text)}
    .btn:hover{transform:translateY(-1px)}
    .chat{display:flex;flex-direction:column;min-width:0;background:linear-gradient(180deg,rgba(16,20,25,.8),rgba(8,10,14,.9));overflow:hidden;height:100%}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.02);flex:0 0 auto}
    .topbar-left{display:flex;align-items:center;gap:12px;min-width:0}
    .topbar h2{margin:0;font-size:14px;letter-spacing:.16em;color:#ff6565;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pill{padding:7px 11px;border-radius:999px;background:rgba(255,42,42,.08);border:1px solid rgba(255,42,42,.18);font-size:11px;color:#ff9a9a;font-weight:700}
    .banner{margin:14px 18px 0;padding:12px 14px;border-radius:18px;border:1px solid rgba(255,42,42,.18);background:rgba(255,42,42,.08);color:#ffd7d7;font-weight:700;display:none;flex:0 0 auto}
    .banner.show{display:block}
    .banner.warn{border-color:rgba(255,204,0,.22);background:rgba(255,204,0,.08);color:#ffefb0}
    .messages{flex:1;overflow:auto;padding:22px 22px calc(22px + var(--safe-bottom));display:flex;flex-direction:column;gap:14px;min-height:0}
    .day{align-self:center;padding:7px 12px;border-radius:999px;background:rgba(255,42,42,.08);border:1px solid rgba(255,42,42,.15);font-size:10px;letter-spacing:.22em;color:#ff8080;font-weight:800}
    .msg-wrap{display:flex;gap:10px;align-items:flex-end;max-width:82%}
    .msg-wrap.me{align-self:flex-end;flex-direction:row-reverse}
    .bubble{padding:11px 13px;border-radius:18px;background:var(--soft);border:1px solid rgba(255,255,255,.05);line-height:1.4;box-shadow:0 8px 20px rgba(0,0,0,.18);word-break:break-word;font-size:13.5px}
    .msg-wrap.me .bubble{background:linear-gradient(145deg,var(--red),var(--red-2));border-color:transparent}
    .meta{font-size:10px;color:var(--muted);margin:2px 6px}
    .msg-user{font-weight:800;color:var(--blue);font-size:11px;margin:0 0 6px}
    .composer{padding:16px 18px;border-top:1px solid var(--line);background:rgba(255,255,255,.02);flex:0 0 auto}
    .composer-box{display:flex;gap:12px;align-items:flex-end;background:#0b1015;border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:10px 10px 10px 16px}
    textarea{flex:1;resize:none;background:transparent;border:none;outline:none;color:var(--text);font:inherit;font-size:14px;line-height:1.4;min-height:24px;max-height:140px;padding:6px 0}
    textarea::placeholder{color:#6f7c8e}
    .send{width:50px;height:50px;border-radius:16px;border:none;background:linear-gradient(145deg,var(--red),var(--red-2));color:#fff;font-size:18px;cursor:pointer;flex:0 0 auto}
    .send:disabled{opacity:.55;cursor:not-allowed}
    .empty{display:grid;place-items:center;height:100%;padding:24px;text-align:center;color:var(--muted)}
    .mobile-top{display:none;flex:0 0 auto}
    .mobile-stack{display:flex;align-items:center;gap:10px}
    .mobile-drawer{display:none}
    .mobile-drawer.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);z-index:20}
    .mobile-drawer-card{position:absolute;left:12px;right:12px;top:calc(68px + var(--safe-top));bottom:calc(12px + var(--safe-bottom));background:linear-gradient(180deg,rgba(17,22,28,.98),rgba(8,10,14,.98));border:1px solid rgba(255,42,42,.16);border-radius:24px;padding:14px;display:flex;flex-direction:column;gap:12px}
    .mobile-drawer-head{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .empty-list{padding:12px;border:1px dashed rgba(255,255,255,.1);border-radius:18px;color:var(--muted);line-height:1.5}
    @media (max-width: 920px){
      .app{grid-template-columns:1fr;height:100dvh;min-height:100dvh;padding:0}
      .sidebar{display:none}
      .chat{height:100dvh;min-height:0;border:none}
      .mobile-top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:calc(10px + var(--safe-top)) calc(12px + var(--safe-right)) 10px calc(12px + var(--safe-left));border-bottom:1px solid var(--line);background:rgba(0,0,0,.25)}
      .topbar{padding:14px 14px 12px}
      .banner{margin:12px 12px 0}
      .messages{padding:14px;flex:1;min-height:0;overflow:auto}
      .composer{position:sticky;bottom:0;left:0;right:0;z-index:4;padding:12px calc(12px + var(--safe-right)) calc(12px + var(--safe-bottom)) calc(12px + var(--safe-left));background:linear-gradient(180deg,rgba(17,22,28,.92),rgba(11,16,21,.98));backdrop-filter:blur(8px)}
      .composer-box{border-radius:20px}
      .msg-wrap{max-width:92%}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">👻</div>
        <h1>MUZZ<span>SNAP</span></h1>
      </div>

      <div class="card">
        <p class="section-title">Private Access</p>
        <div class="user-badge">
          <div class="avatar red" id="meAvatar">M</div>
          <div>
            <div style="font-weight:800" id="meName">Node_User</div>
            <div class="muted small" id="meSubtext">Wallet private inbox</div>
          </div>
        </div>
      </div>

      <div class="card" style="min-height:0;display:flex;flex-direction:column;flex:1">
        <p class="section-title">Wallet Directory</p>
        <div class="contact-list" id="contactList"></div>
      </div>

      <div class="side-actions">
        <button class="btn ghost" onclick="window.location.href='chat.html'">← Back to Chat</button>
        <button class="btn red" id="refreshBtn" type="button">Refresh Wallet List</button>
      </div>
    </aside>

    <section class="chat">
      <div class="mobile-top">
        <div class="mobile-stack">
          <button class="btn ghost" style="padding:10px 12px;border-radius:14px" onclick="window.location.href='chat.html'">← Back</button>
          <button class="btn ghost" id="walletsToggleBtn" type="button" style="padding:10px 12px;border-radius:14px">Wallets</button>
        </div>
        <div style="font-weight:900;letter-spacing:.08em">MUZZ<span style="color:var(--red)">SNAP</span></div>
      </div>

      <div class="mobile-drawer" id="mobileDrawer">
        <div class="mobile-drawer-card">
          <div class="mobile-drawer-head">
            <div>
              <div class="section-title" style="margin:0 0 6px">Wallet Directory</div>
              <div class="small muted">Choose a wallet to open a private thread.</div>
            </div>
            <button class="btn ghost" id="mobileDrawerClose" type="button" style="padding:10px 12px;border-radius:14px">Close</button>
          </div>
          <div class="contact-list" id="mobileContactList"></div>
        </div>
      </div>

      <div class="topbar" id="chatHeader"></div>
      <div class="banner" id="statusBanner"></div>
      <div class="messages" id="messages"></div>
      <div class="composer">
        <div class="composer-box">
          <textarea id="messageInput" placeholder="Write a private message..."></textarea>
          <button class="send" id="sendBtn" type="button">➤</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const MUZZ_TOKEN = '0xef3dAa5fDa8Ad7aabFF4658f1F78061fd626B8f0';
    const MUZZ_MIN_REQUIRED = 2000000;
    const ADMIN_MAP = {
      '0x208157b5ec396759e8754058108ecf53e32392ff': { role:'ryachu', name:'Ryachu', avatar:'👑', avatarClass:'gold' },
      '0xfab5835ca14fb3f9f978c5e4d733734e6394e03f': { role:'itsuki', name:'Itsuki', avatar:'💎', avatarClass:'blue' },
      '0x875c5a7794b601f273da58e3c1d10671d16130ec': { role:'esteban', name:'Esteban', avatar:'🛡️', avatarClass:'admin' }
    };
    const ERC20_ABI = [
      'function balanceOf(address) view returns (uint256)',
      'function decimals() view returns (uint8)'
    ];

    const fbConfig = {
      apiKey: atob('QUl6YVN5QWUxLUpmTmRlME5LSU1kRTdwaGZFWGxtOUphcVVIMGpZ'),
      authDomain: atob('cHVsc2FyaS5maXJlYmFzZWFwcC5jb20='),
      databaseURL: atob('aHR0cHM6Ly9wdWxzYXJpLWRlZmF1bHQtcnRkYi5maXJlYmFzZWlvLmNvbQ=='),
      projectId: atob('cHVsc2FyaQ=='),
      storageBucket: atob('cHVsc2FyaS5maXJlYmFzZXN0b3JhZ2UuYXBw'),
      messagingSenderId: atob('ODI0MzA2MzIxMjMz'),
      appId: atob('MTo4MjQzMDYzMjEyMzM6d2ViOjJjOWJmYTAyMTcwYTE3ZDU2MGI1NzA=')
    };

    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const meRaw = String(sessionStorage.getItem('muzz_wallet_address') || '').trim();
    const meWallet = meRaw.toLowerCase();
    const meIsGuest = !meWallet || meWallet.startsWith('guest_');
    const meAdminConfig = ADMIN_MAP[meWallet] || null;
    const meIsAdmin = sessionStorage.getItem('muzz_is_admin') === 'true' || !!meAdminConfig;
    const meRole = meAdminConfig?.role || (meIsGuest ? 'guest' : 'user');
    const meName = meAdminConfig?.name || (meIsGuest ? meRaw.replace('guest_','') : `Node_${meWallet.slice(-4) || 'User'}`);
    const meAvatar = meAdminConfig?.avatar || initials(meName);
    const meAvatarClass = meAdminConfig?.avatarClass || 'red';

    const meAvatarEl = document.getElementById('meAvatar');
    const meNameEl = document.getElementById('meName');
    const meSubtextEl = document.getElementById('meSubtext');
    const contactListEl = document.getElementById('contactList');
    const chatHeaderEl = document.getElementById('chatHeader');
    const messagesEl = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const bannerEl = document.getElementById('statusBanner');
    const refreshBtn = document.getElementById('refreshBtn');
    const walletsToggleBtn = document.getElementById('walletsToggleBtn');
    const mobileDrawer = document.getElementById('mobileDrawer');
    const mobileDrawerClose = document.getElementById('mobileDrawerClose');
    const mobileContactListEl = document.getElementById('mobileContactList');

    let contacts = [];
    let contactsMap = {};
    let activeWallet = null;
    let currentMessages = [];
    let registryRef = null;
    let threadIndexRef = null;
    let threadMessagesRef = null;
    let threadMetaRef = null;
    let threadMessagesHandler = null;
    let threadMetaHandler = null;
    let threadMetaMap = {};

    function initials(text){
      return (text || 'M').replace(/[^a-zA-Z0-9]/g,'').slice(0,1).toUpperCase() || 'M';
    }

    function escapeHtml(str){
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#039;');
    }

    function showBanner(text, tone = 'error'){
      bannerEl.textContent = text;
      bannerEl.className = `banner show ${tone === 'warn' ? 'warn' : ''}`;
    }

    function hideBanner(){
      bannerEl.className = 'banner';
      bannerEl.textContent = '';
    }

    function shortenWallet(wallet){
      if(!wallet) return 'Wallet contact';
      return `${wallet.slice(0,6)}...${wallet.slice(-4)}`;
    }

    function resolveDisplay(entry){
      const wallet = String(entry.wallet || '').toLowerCase();
      const admin = ADMIN_MAP[wallet];
      return {
        name: admin?.name || entry.username || `Node_${wallet.slice(-4)}`,
        role: admin?.role || entry.role || 'user',
        avatar: admin?.avatar || '👤',
        avatarClass: admin?.avatarClass || '',
        isAdmin: !!admin || !!entry.isAdmin
      };
    }

    function getThreadId(a, b){
      return [String(a || '').toLowerCase(), String(b || '').toLowerCase()].sort().join('__');
    }

    function getThreadMeta(contactWallet){
      return threadMetaMap[getThreadId(meWallet, contactWallet)] || null;
    }

    function formatTime(timestamp){
      if(!timestamp) return '';
      const date = new Date(timestamp);
      return date.toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
    }

    function formatDay(timestamp){
      if(!timestamp) return 'TODAY';
      const date = new Date(timestamp);
      const now = new Date();
      const yesterday = new Date();
      yesterday.setDate(now.getDate() - 1);
      if(date.toDateString() === now.toDateString()) return 'TODAY';
      if(date.toDateString() === yesterday.toDateString()) return 'YESTERDAY';
      return date.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }).toUpperCase();
    }

    function autoResizeInput(){
      messageInput.style.height = '26px';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 140) + 'px';
    }

    function setComposerEnabled(enabled){
      messageInput.disabled = !enabled;
      sendBtn.disabled = !enabled;
      if(!enabled){
        messageInput.blur();
      }
    }

    function sortContacts(){
      contacts.sort((a,b) => {
        const aMeta = getThreadMeta(a.wallet);
        const bMeta = getThreadMeta(b.wallet);
        const aStamp = aMeta?.updatedAt || a.sortStamp || 0;
        const bStamp = bMeta?.updatedAt || b.sortStamp || 0;
        return bStamp - aStamp;
      });
    }

    function closeMobileDrawer(){
      if(mobileDrawer) mobileDrawer.classList.remove('show');
    }

    function openMobileDrawer(){
      if(mobileDrawer) mobileDrawer.classList.add('show');
    }

    function renderMe(){
      meAvatarEl.textContent = meAvatar;
      meAvatarEl.className = `avatar ${meAvatarClass}`.trim();
      meNameEl.textContent = meName || 'Node_User';
      meSubtextEl.textContent = meIsAdmin ? 'Admin private access' : 'Wallet private inbox';
    }

    function renderContacts(){
      contactListEl.innerHTML = '';
      if(mobileContactListEl) mobileContactListEl.innerHTML = '';

      if(!contacts.length){
        const emptyHtml = `
          <div class="empty-list">
            No wallet contacts yet.<br>
            Wallet users will appear here after they log in with crypto.
          </div>
        `;
        contactListEl.innerHTML = emptyHtml;
        if(mobileContactListEl) mobileContactListEl.innerHTML = emptyHtml;
        return;
      }

      contacts.forEach(contact => {
        const meta = getThreadMeta(contact.wallet);
        const preview = meta?.lastMessage || contact.subtitle || shortenWallet(contact.wallet);
        const time = meta?.updatedAt ? formatTime(meta.updatedAt) : (contact.active ? 'online' : '');
        const rowHtml = `
          <div class="avatar ${contact.avatarClass || ''}">${contact.avatar || initials(contact.name)}</div>
          <div style="min-width:0;flex:1;text-align:left">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
              <div style="font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(contact.name)}</div>
              <div class="small muted">${escapeHtml(time)}</div>
            </div>
            <div class="small muted" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
              ${escapeHtml(preview)}
            </div>
          </div>
        `;

        const handleSelect = () => {
          if(activeWallet === contact.wallet){
            closeMobileDrawer();
            return;
          }
          activeWallet = contact.wallet;
          currentMessages = [];
          renderHeader();
          renderMessages();
          renderContacts();
          subscribeToActiveThread();
          autoResizeInput();
          closeMobileDrawer();
        };

        const desktopRow = document.createElement('button');
        desktopRow.type = 'button';
        desktopRow.className = 'contact' + (contact.wallet === activeWallet ? ' active' : '');
        desktopRow.innerHTML = rowHtml;
        desktopRow.onclick = handleSelect;
        contactListEl.appendChild(desktopRow);

        if(mobileContactListEl){
          const mobileRow = document.createElement('button');
          mobileRow.type = 'button';
          mobileRow.className = 'contact' + (contact.wallet === activeWallet ? ' active' : '');
          mobileRow.innerHTML = rowHtml;
          mobileRow.onclick = handleSelect;
          mobileContactListEl.appendChild(mobileRow);
        }
      });
    }

    function renderHeader(){
      const contact = contactsMap[activeWallet] || null;
      if(!contact){
        chatHeaderEl.innerHTML = `
          <div class="topbar-left">
            <div class="avatar">🔒</div>
            <div style="min-width:0">
              <h2>PRIVATE</h2>
              <div class="small muted">Select a wallet to start messaging.</div>
            </div>
          </div>
          <div class="pill">Wallet Private</div>
        `;
        setComposerEnabled(false);
        messageInput.placeholder = 'Select a wallet from the directory...';
        return;
      }

      chatHeaderEl.innerHTML = `
        <div class="topbar-left">
          <div class="avatar ${contact.avatarClass || ''}">${contact.avatar || initials(contact.name)}</div>
          <div style="min-width:0">
            <h2>${escapeHtml(contact.name)}</h2>
            <div class="small muted"><span class="status ${contact.active ? '' : 'offline'}"></span>${contact.active ? 'Online' : 'Offline'} · ${escapeHtml(shortenWallet(contact.wallet))}</div>
          </div>
        </div>
        <div class="pill">Wallet Private</div>
      `;
      setComposerEnabled(true);
      messageInput.placeholder = `Message ${contact.name}...`;
    }

    function renderMessages(){
      const contact = contactsMap[activeWallet] || null;
      if(!contact){
        messagesEl.innerHTML = '<div class="empty">Select a wallet from the directory to start a private conversation.</div>';
        return;
      }

      if(!currentMessages.length){
        messagesEl.innerHTML = `
          <div class="empty">
            No messages with ${escapeHtml(contact.name)} yet.<br>
            Send the first private message.
          </div>
        `;
        return;
      }

      let lastDay = '';
      let html = '';
      currentMessages.forEach(msg => {
        const msgDay = formatDay(msg.timestamp);
        if(msgDay !== lastDay){
          html += `<div class="day">${escapeHtml(msgDay)}</div>`;
          lastDay = msgDay;
        }
        const me = String(msg.fromWallet || '').toLowerCase() === meWallet;
        const msgName = me ? meName : (contact.name || shortenWallet(contact.wallet));
        const msgAvatar = me ? meAvatar : (contact.avatar || initials(contact.name));
        const msgAvatarClass = me ? meAvatarClass : (contact.avatarClass || '');
        html += `
          <div class="msg-wrap ${me ? 'me' : ''}">
            <div class="avatar ${me ? 'red' : msgAvatarClass}" style="width:36px;height:36px;border-radius:12px;font-size:14px">${escapeHtml(msgAvatar)}</div>
            <div>
              <div class="meta">${escapeHtml(msgName)} · ${escapeHtml(formatTime(msg.timestamp))}</div>
              <div class="bubble">
                ${!me ? `<div class="msg-user">${escapeHtml(contact.name)}</div>` : ''}
                ${escapeHtml(msg.text || '')}
              </div>
            </div>
          </div>
        `;
      });
      messagesEl.innerHTML = html;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function syncContacts(){
      if(registryRef) registryRef.off();
      registryRef = db.ref('walletRegistry');
      registryRef.on('value', snap => {
        const data = snap.val() || {};
        contacts = Object.values(data)
          .filter(entry => entry && entry.wallet && String(entry.wallet).toLowerCase() !== meWallet && entry.isWallet !== false)
          .map(entry => {
            const wallet = String(entry.wallet).toLowerCase();
            const display = resolveDisplay(entry);
            return {
              wallet,
              name: display.name,
              role: display.role,
              avatar: display.avatar,
              avatarClass: display.avatarClass,
              isAdmin: display.isAdmin,
              active: !!entry.active,
              subtitle: shortenWallet(wallet),
              sortStamp: entry.lastLogin || entry.lastSeen || 0
            };
          });
        sortContacts();

        contactsMap = Object.fromEntries(contacts.map(contact => [contact.wallet, contact]));

        if(activeWallet && !contactsMap[activeWallet]){
          activeWallet = null;
          currentMessages = [];
          unsubscribeThread();
        }
        if(!activeWallet && contacts.length){
          activeWallet = contacts[0].wallet;
          subscribeToActiveThread();
        }
        renderContacts();
        renderHeader();
        renderMessages();
      });
    }

    function syncThreadMeta(){
      if(threadIndexRef) threadIndexRef.off();
      threadIndexRef = db.ref('privateThreads');
      threadIndexRef.on('value', snap => {
        const data = snap.val() || {};
        const nextMeta = {};
        Object.entries(data).forEach(([threadId, threadData]) => {
          if(!threadId.includes(meWallet) || !threadData?.meta) return;
          nextMeta[threadId] = threadData.meta;
        });
        threadMetaMap = nextMeta;
        sortContacts();
        renderContacts();
      });
    }

    function unsubscribeThread(){
      if(threadMessagesRef && threadMessagesHandler){
        threadMessagesRef.off('value', threadMessagesHandler);
      }
      if(threadMetaRef && threadMetaHandler){
        threadMetaRef.off('value', threadMetaHandler);
      }
      threadMessagesRef = null;
      threadMetaRef = null;
      threadMessagesHandler = null;
      threadMetaHandler = null;
    }

    function subscribeToActiveThread(){
      unsubscribeThread();
      const contact = contactsMap[activeWallet] || null;
      if(!contact){
        renderHeader();
        renderMessages();
        return;
      }

      const threadId = getThreadId(meWallet, activeWallet);
      threadMessagesRef = db.ref(`privateThreads/${threadId}/messages`).limitToLast(200);
      threadMessagesHandler = snap => {
        const data = snap.val() || {};
        currentMessages = Object.keys(data)
          .map(id => ({ id, ...data[id] }))
          .sort((a,b) => (a.timestamp || 0) - (b.timestamp || 0));
        renderMessages();
      };
      threadMessagesRef.on('value', threadMessagesHandler);

      threadMetaRef = db.ref(`privateThreads/${threadId}/meta`);
      threadMetaHandler = snap => {
        threadMetaMap[threadId] = snap.val() || null;
        renderContacts();
      };
      threadMetaRef.on('value', threadMetaHandler);

      renderHeader();
      renderMessages();
    }

    async function registerCurrentWallet(){
      const registryPath = `walletRegistry/${meWallet}`;
      const ref = db.ref(registryPath);
      const snap = await ref.once('value');
      const prev = snap.val() || {};
      await ref.update({
        wallet: meWallet,
        username: meName,
        role: meRole,
        isAdmin: meIsAdmin,
        isWallet: true,
        firstSeen: prev.firstSeen || firebase.database.ServerValue.TIMESTAMP,
        lastLogin: firebase.database.ServerValue.TIMESTAMP,
        lastSeen: firebase.database.ServerValue.TIMESTAMP,
        active: true
      });
      ref.child('active').onDisconnect().set(false);
      ref.child('lastSeen').onDisconnect().set(firebase.database.ServerValue.TIMESTAMP);
    }

    async function verifyPrivateAccess(){
      if(!meRaw){
        window.location.href = 'login.html';
        return false;
      }

      if(meIsGuest){
        alert('Private access is only available for wallet users.');
        window.location.href = 'chat.html';
        return false;
      }

      if(meIsAdmin){
        return true;
      }

      if(typeof window.ethereum === 'undefined' || typeof ethers === 'undefined'){
        alert('A Web3 wallet is required to validate your MUZZ balance.');
        window.location.href = 'chat.html';
        return false;
      }

      try{
        const chainId = await window.ethereum.request({ method: 'eth_chainId' });
        if(chainId !== '0x1'){
          try{
            await window.ethereum.request({
              method: 'wallet_switchEthereumChain',
              params: [{ chainId: '0x1' }]
            });
          }catch(err){
            alert('Please switch to Ethereum Mainnet to access MUZZ PRIVATE.');
            window.location.href = 'chat.html';
            return false;
          }
        }

        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const token = new ethers.Contract(MUZZ_TOKEN, ERC20_ABI, provider);
        const [rawBalance, decimals] = await Promise.all([
          token.balanceOf(meWallet),
          token.decimals()
        ]);
        const formattedBalance = parseFloat(ethers.utils.formatUnits(rawBalance, decimals));
        if(formattedBalance < MUZZ_MIN_REQUIRED){
          alert(`Access to MUZZ PRIVATE requires at least 2,000,000 MUZZ tokens. Your current balance is ${formattedBalance.toLocaleString(undefined,{maximumFractionDigits:2})} MUZZ.`);
          window.location.href = 'chat.html';
          return false;
        }
        return true;
      }catch(err){
        console.error('MUZZ validation failed:', err);
        alert('Your MUZZ balance could not be verified. Please try again from chat.');
        window.location.href = 'chat.html';
        return false;
      }
    }

    async function sendMessage(){
      const text = messageInput.value.trim();
      const contact = contactsMap[activeWallet] || null;
      if(!text || !contact) return;

      try{
        sendBtn.disabled = true;
        const threadId = getThreadId(meWallet, activeWallet);
        const threadRef = db.ref(`privateThreads/${threadId}`);
        const messageRef = threadRef.child('messages').push();
        const now = firebase.database.ServerValue.TIMESTAMP;

        await messageRef.set({
          fromWallet: meWallet,
          toWallet: activeWallet,
          fromName: meName,
          toName: contact.name,
          text,
          timestamp: now
        });

        await threadRef.child('meta').update({
          participants: {
            [meWallet]: true,
            [activeWallet]: true
          },
          participantNames: {
            [meWallet]: meName,
            [activeWallet]: contact.name
          },
          updatedAt: firebase.database.ServerValue.TIMESTAMP,
          lastMessage: text,
          lastSender: meWallet
        });

        messageInput.value = '';
        autoResizeInput();
        hideBanner();
      }catch(err){
        console.error('Send failed:', err);
        showBanner('Message could not be sent. Check Firebase rules and try again.');
      }finally{
        sendBtn.disabled = false;
      }
    }

    async function boot(){
      renderMe();
      autoResizeInput();
      renderHeader();
      renderMessages();
      showBanner('Syncing wallet directory...', 'warn');
      setComposerEnabled(false);

      const accessGranted = await verifyPrivateAccess();
      if(!accessGranted) return;

      try{
        await auth.signInAnonymously();
        await registerCurrentWallet();
        syncThreadMeta();
        syncContacts();
        hideBanner();
      }catch(err){
        console.error('Private boot error:', err);
        showBanner('Wallet directory could not be loaded. Check Firebase connection and rules.');
      }
    }

    refreshBtn.addEventListener('click', () => {
      hideBanner();
      syncThreadMeta();
      syncContacts();
    });
    if(walletsToggleBtn) walletsToggleBtn.addEventListener('click', openMobileDrawer);
    if(mobileDrawerClose) mobileDrawerClose.addEventListener('click', closeMobileDrawer);
    if(mobileDrawer) mobileDrawer.addEventListener('click', (e) => {
      if(e.target === mobileDrawer) closeMobileDrawer();
    });
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    messageInput.addEventListener('input', autoResizeInput);
    messageInput.addEventListener('keydown', e => {
      if(e.key === 'Enter' && !e.shiftKey){
        e.preventDefault();
        sendMessage();
      }
    });
    window.addEventListener('resize', () => {
      autoResizeInput();
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });

    boot();
  </script>
</body>
</html>
